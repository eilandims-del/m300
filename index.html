<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Análise - M300</title>
    <meta name="description" content="Análise - M300 — painel de análise operacional de equipes e KPIs." />
    <meta name="theme-color" content="#2563eb" />

    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Análise - M300" />
    <meta property="og:title" content="Análise - M300" />
    <meta property="og:description" content="Painel de análise operacional de equipes e KPIs." />
    <meta property="og:image" content="https://eilandims-del.github.io/m300/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Análise - M300" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Análise - M300" />
    <meta name="twitter:description" content="Painel de análise operacional de equipes e KPIs." />
    <meta name="twitter:image" content="https://eilandims-del.github.io/m300/og-image.png" />

    <script>
      (function () {
        try {
          var origin = window.location.origin + (window.location.pathname.replace(/\/[^/]*$/, '/') || '/');
          var image = new URL('og-image.png', origin).href;
          function setMeta(attr, key, value) {
            var el = document.querySelector('meta[' + attr + '="' + key + '"]');
            if (el) el.setAttribute('content', value);
          }
          setMeta('property', 'og:url', origin);
          setMeta('property', 'og:image', image);
          setMeta('name', 'twitter:image', image);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
